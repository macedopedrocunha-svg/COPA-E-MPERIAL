<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CLASSIFICAÇÃO - COPA E-MPERIAL</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('imperial.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        /* MENU CORRIGIDO */
        .nav-menu {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            padding-top: 20px;
        }

        .nav-link {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        /* Botão Azul (Inativo) */
        .btn-blue {
            color: white;
            background: rgba(58, 124, 165, 0.8);
            border-bottom: 3px solid #FBAE17;
        }
        .btn-blue:hover { background: #3A7CA5; }

        /* Botão Amarelo (Ativo nesta página) */
        .btn-active {
            background: #FBAE17;
            color: #1A1A1A;
        }

        .header {
            background-color: rgba(58, 124, 165, 0.85);
            padding: 20px;
            border-bottom: 7px solid #FBAE17;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(36, 41, 47, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        th {
            background-color: rgba(26, 26, 26, 0.9);
            color: #FBAE17;
            padding: 15px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pos { width: 50px; font-weight: bold; color: #FBAE17; }
        .team-col { text-align: left; font-weight: bold; }
        .v-cell { color: #4CAF50; font-weight: bold; }
        .d-cell { color: #FF4655; font-weight: bold; }

        tr:hover { background: rgba(255, 255, 255, 0.05); }
        .top-4 { border-left: 4px solid #4CAF50; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-menu">
            <a href="index.html" class="nav-link btn-blue">JOGOS</a>
            <a href="classificacao.html" class="nav-link btn-active">TABELA GERAL</a>
            <a href="times.html" class="nav-link btn-blue">TIMES</a>
        </div>

        <div class="header">
            <h1>CLASSIFICAÇÃO</h1>
            <p>COPA E-MPERIAL | SEASON 1</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th class="team-col">TIME</th>
                    <th>V</th>
                    <th>D</th>
                    <th>RD GANHOS</th>
                    <th>SALDO RD</th>
                    <th>PONTOS</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

<script>
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRly8c0eYhojmA0KX4aMxtYShdqJsKY9vI8oDjvTewqev7OepYJm9L5H5PZEL5_O0hZW9Y-gOrlNi63/pub?gid=1383739588&single=true&output=csv';

  async function carregarClassificacao() {
    try {
        const response = await fetch(sheetClassificacaoURL);
        const data = await response.text();
        
        // Divide o conteúdo em linhas e remove espaços vazios
        let linhas = data.split('\n').map(l => l.trim()).filter(l => l !== "");

        // FILTRO DEFINITIVO: Mantém apenas linhas que começam com um número (a posição)
        // Isso remove automaticamente cabeçalhos como "Posição", "#" ou linhas de texto.
        linhas = linhas.filter(linha => {
            const primeiraColuna = linha.split(/[,;]/)[0];
            return !isNaN(parseInt(primeiraColuna)); 
        });

        const tabelaCorpo = document.querySelector('#tabela-classificacao tbody');
        tabelaCorpo.innerHTML = ''; 

        linhas.forEach((linha) => {
            const col = linha.split(/[,;]/);
            if (col.length < 2) return;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${col[0]}º</td>
                <td class="team-name">${col[1]}</td>
                <td class="stat-cell" style="color: #4CAF50;">${col[2] || 0}</td>
                <td class="stat-cell" style="color: #f44336;">${col[3] || 0}</td>
                <td class="stat-cell">${col[4] || 0}</td>
                <td class="stat-cell">${col[5] || 0}</td>
                <td class="points-cell">${col[6] || 0}</td>
            `;
            tabelaCorpo.appendChild(tr);
        });
    } catch (error) {
        console.error('Erro ao carregar classificação:', error);
    }
}

    carregarClassificacao();
    setInterval(carregarClassificacao, 60000);
</script>
</body>
</html>
