<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EQUIPES - COPA E-MPERIAL</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('imperial.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: -1;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* MENU UNIFICADO */
        .nav-menu {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            padding-top: 20px;
        }

        .nav-link {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-blue {
            color: white;
            background: rgba(58, 124, 165, 0.8);
            border-bottom: 3px solid #FBAE17;
        }
        .btn-blue:hover { background: #3A7CA5; }

        .btn-active {
            background: #FBAE17;
            color: #1A1A1A;
        }

        /* Grid de Times */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        /* Card do Time */
        .team-card {
            background: rgba(36, 41, 47, 0.9);
            border: 1px solid rgba(251, 174, 23, 0.3);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            position: relative;
            transition: all 0.4s ease;
            overflow: hidden;
            cursor: pointer;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .team-card:hover {
            border-color: #FBAE17;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .team-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
            background: rgba(255,255,255,0.1); /* Espaço reservado para logo */
            border-radius: 50%;
        }

        .team-name {
            font-size: 1.2em;
            color: #FBAE17;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
        }

        /* Lista de Players */
        .player-list {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            list-style: none;
            padding: 0; margin: 0;
        }

        .team-card:hover .player-list {
            opacity: 1;
        }

        .player-item {
            padding: 5px 0;
            font-weight: bold;
            font-size: 0.9em;
            color: #fff;
            border-bottom: 1px solid rgba(251, 174, 23, 0.2);
            width: 80%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-menu">
            <a href="index.html" class="nav-link btn-blue">JOGOS</a>
            <a href="classificacao.html" class="nav-link btn-blue">TABELA GERAL</a>
            <a href="times.html" class="nav-link btn-active">TIMES</a>
        </div>

        <h1 style="text-align: center; border-bottom: 3px solid #FBAE17; padding-bottom: 10px;">EQUIPES PARTICIPANTES</h1>

        <div class="teams-grid">
            
            <script>
                // Script simples para gerar as 16 caixas sem encher o código de texto repetido
                for (let i = 1; i <= 16; i++) {
                    document.write(`
                        <div class="team-card">
                            <div class="team-logo"></div> <span class="team-name">Inserir Texto</span>
                            <p style="font-size: 0.8em; color: #bbb;">País / Região</p>
                            
                            <ul class="player-list">
                                <li class="player-item">Cadastrar</li>
                                <li class="player-item">Cadastrar</li>
                                <li class="player-item">Cadastrar</li>
                                <li class="player-item">Cadastrar</li>
                                <li class="player-item">Cadastrar</li>
                            </ul>
                        </div>
                    `);
                }
            </script>
            </div>
    </div>

</body>
</html>
