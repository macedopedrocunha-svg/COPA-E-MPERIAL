<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>COPA E-MPERIAL - Tabela de Jogos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('imperial.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-color: #1A1A1A;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        } 

        /* ESTILO DOS LINKS DO MENU */
        .nav-menu {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            padding-top: 20px;
        }

        .nav-link {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        /* Botão Inativo */
        .btn-blue {
            color: white;
            background: rgba(58, 124, 165, 0.8);
            border-bottom: 3px solid #FBAE17;
        }
        .btn-blue:hover { background: #3A7CA5; }

        /* Botão Ativo (Página atual) */
        .btn-active {
            background: #FBAE17;
            color: #1A1A1A;
        }

        .event-header {
            background-color: rgba(58, 124, 165, 0.85);
            padding: 20px;
            border-bottom: 7px solid #FBAE17;
            margin-bottom: 20px;
            border-radius: 8px 8px 0 0;
        }

        h1 { margin: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(36, 41, 47, 0.75); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        th {
            background-color: rgba(49, 55, 62, 0.9);
            padding: 12px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            color: #FBAE17;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }

        .team-name {
            font-weight: bold;
            width: 35%;
            color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .team-right { text-align: right; }

        .score-cell {
            text-align: center;
            width: 15%;
        }

        .score {
            background-color: #FBAE17;
            color: #1A1A1A;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace; 
            font-weight: bold;
            font-size: 16px;
        }

        .status { font-size: 12px; color: #bbb; text-align: center; }

        /* EFEITO AO VIVO PULSANTE */
        @keyframes pulsar-neon {
            0% { text-shadow: 0 0 5px #ff4655; opacity: 1; }
            50% { text-shadow: 0 0 15px #ff4655, 0 0 25px #ff4655; opacity: 0.8; }
            100% { text-shadow: 0 0 5px #ff4655; opacity: 1; }
        }

        .live-link {
            color: #ff4655;
            text-decoration: none;
            font-weight: bold;
            animation: pulsar-neon 1.5s infinite;
        }

        .live-link:hover {
            text-decoration: underline;
            color: #ff7a85;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-menu">
            <a href="index.html" class="nav-link btn-active">JOGOS</a>
            <a href="classificacao.html" class="nav-link btn-blue">TABELA GERAL</a>
            <a href="times.html" class="nav-link btn-blue">TIMES</a>
        </div>

        <div class="event-header">
            <h1>COPA E-MPERIAL</h1>
            <p>STAGE 1 • SEMANA 1</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>HORA</th>
                    <th style="text-align: right;">TIME A</th>
                    <th style="text-align: center;">PLACAR</th>
                    <th>TIME B</th>
                    <th style="text-align: center;">STATUS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>17:00</td>
                    <td class="team-name team-right">TIME U</td> 
                    <td class="score-cell"><span class="score">0 - 0</span></td> 
                    <td class="team-name">TIME O</td> 
                    <td class="status">TBD</td>
                </tr>
                <tr>
                    <td>19:00</td>
                    <td class="team-name team-right">TIME X</td>
                    <td class="score-cell"><span class="score">0 - 0</span></td>
                    <td class="team-name">TIME Z</td>
                    <td class="status">
                        <a href="https://www.twitch.tv/atlcompufpel" target="_blank" class="live-link">AO VIVO</a>
                    </td>
                </tr>
                </tbody>
        </table>
    </div>
</body>
</html>
