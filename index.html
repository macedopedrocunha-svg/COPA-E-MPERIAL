<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>COPA E-MPERIAL - JOGOS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('imperial.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: -1;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .nav-menu { margin-bottom: 20px; display: flex; gap: 10px; padding-top: 20px; }
        .nav-link {
            text-decoration: none; padding: 10px 20px; border-radius: 4px;
            font-weight: bold; transition: 0.3s; display: inline-block;
        }
        .btn-blue { color: white; background: rgba(58, 124, 165, 0.8); border-bottom: 3px solid #FBAE17; }
        .btn-active { background: #FBAE17; color: #1A1A1A; }

        .event-header {
            background-color: rgba(58, 124, 165, 0.85);
            padding: 20px;
            border-bottom: 7px solid #FBAE17;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(36, 41, 47, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        th {
            background-color: rgba(26, 26, 26, 0.9);
            color: #FBAE17;
            padding: 15px;
            text-transform: uppercase;
            font-size: 12px;
        }

        td { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }

        .team-name { font-weight: bold; width: 35%; text-transform: uppercase; }
        .team-right { text-align: right; }
        
        .score-cell { width: 15%; text-align: center; }
        .score {
            background: #FBAE17; color: #1A1A1A;
            padding: 5px 15px; border-radius: 4px;
            font-weight: bold; display: inline-block; min-width: 60px;
        }

        .status { text-align: center; font-weight: bold; font-size: 0.9em; width: 15%; }

        .live-link {
            color: #FF4655; text-decoration: none;
            border: 1px solid #FF4655; padding: 3px 8px; border-radius: 4px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 70, 85, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 70, 85, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 70, 85, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-menu">
            <a href="index.html" class="nav-link btn-active">JOGOS</a>
            <a href="classificacao.html" class="nav-link btn-blue">TABELA GERAL</a>
            <a href="times.html" class="nav-link btn-blue">TIMES</a>
        </div>

        <div class="event-header">
            <h1>COPA E-MPERIAL</h1>
            <p>CONFRONTOS • SEASON 1</p>
        </div>

        <table id="tabela-jogos">
            <thead>
                <tr>
                    <th>HORA</th>
                    <th style="text-align: right;">TIME A</th>
                    <th style="text-align: center;">PLACAR</th>
                    <th>TIME B</th>
                    <th style="text-align: center;">STATUS</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        // SUBSTITUA PELO SEU LINK CSV DA ABA JOGOS
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRly8c0eYhojmA0KX4aMxtYShdqJsKY9vI8oDjvTewqev7OepYJm9L5H5PZEL5_O0hZW9Y-gOrlNi63/pub?gid=1824379697&single=true&output=csv';

        async function carregarJogos() {
            try {
                const response = await fetch(sheetURL);
                const data = await response.text();
                // Divide as linhas e remove o cabeçalho
                const linhas = data.split('\n').slice(1); 
                
                const tabelaCorpo = document.querySelector('#tabela-jogos tbody');
                tabelaCorpo.innerHTML = ''; 

                linhas.forEach(linha => {
                    // Divide por vírgula ou ponto e vírgula
                    const col = linha.split(/[,;]/);
                    
                    // Só cria a linha se tiver dados (evita linhas vazias no fim da planilha)
                    if (col.length >= 4 && col[1].trim() !== "") {
                        const tr = document.createElement('tr');
                        
                        let statusHTML = col[4] ? col[4].trim() : "TBD";
                        if (statusHTML.toUpperCase() === 'AO VIVO') {
                            statusHTML = `<a href="https://www.twitch.tv/atlcompufpel" target="_blank" class="live-link">AO VIVO</a>`;
                        }

                        tr.innerHTML = `
                            <td style="text-align: center;">${col[0]}</td>
                            <td class="team-name team-right">${col[1]}</td>
                            <td class="score-cell"><span class="score">${col[2] || '0 - 0'}</span></td>
                            <td class="team-name">${col[3]}</td>
                            <td class="status">${statusHTML}</td>
                        `;
                        tabelaCorpo.appendChild(tr);
                    }
                });
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
            }
        }

        carregarJogos();
        // Atualiza a cada 1 minuto caso você mude o placar na planilha
        setInterval(carregarJogos, 60000);
    </script>
</body>
</html>
